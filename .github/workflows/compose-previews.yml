name: Compose Screenshot Snapshots

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  snapshots:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools build-tools;35.0.0 platforms;android-36'

      - name: Generate local.properties
        run: |
          cat <<PROPS > local.properties
          sdk.dir=${ANDROID_SDK_ROOT}
          use_local_pumpx2=false
          PROPS

      - name: Record snapshots (push to main/dev)
        if: github.event_name == 'push'
        run: ./gradlew --stacktrace :mobile:recordRoborazziDebug :wear:recordRoborazziDebug

      - name: Verify snapshots (pull request)
        if: github.event_name == 'pull_request'
        run: ./gradlew --stacktrace :mobile:compareRoborazziDebug :wear:compareRoborazziDebug
        continue-on-error: true

      - name: Upload comparison reports
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: roborazzi-compare-reports
          path: |
            mobile/build/outputs/roborazzi/
            wear/build/outputs/roborazzi/
          if-no-files-found: warn
